window:
  dimensions:
    columns: 90
    lines: 30
  padding:
    x: 12
    y: 10
  class:
    instance: Alacritty
    general: Alacritty
  opacity: .95

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: JetBrainsMono Nerd Font
    style: Regular
  bold:
    family: JetBrainsMono Nerd Font
    style: Bold
  italic:
    family: JetBrainsMono Nerd Font
    style: Italic
  bold_italic:
    family: JetBrainsMono Nerd Font
    style: Bold Italic
  size: 12
draw_bold_text_with_bright_colors: true

cursor:
  style:
    shape: Beam
    blinking: On
  blink_interval: 750
  blink_timeout: 5
  unfocused_hollow: true

import:
  - /home/gustavo/.config/alacritty/catppuccin-mocha.yml

selection:
  save_to_clipboard: false

key_bindings:
  - { key: Return, mods: Super|Shift, action: SpawnNewInstance }
